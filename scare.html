<html>
<head><title>🔴 Security Alert</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d0d0d; color: white; text-align: center; font-family: 'Courier New', monospace; height: 100vh; width: 100vw; overflow: hidden; cursor: none; }
h1 { font-size: 60px; color: #ff0000; text-shadow: 0 0 20px red; animation: blink 0.8s infinite; margin-top: 80px; }
@keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
.box { border: 3px solid #ff0000; padding: 30px; margin: 40px auto; width: 80%; max-width: 600px; background: #1a0000; box-shadow: 0 0 30px red; }
p { font-size: 22px; margin: 15px; }
.red { color: #ff0000; font-weight: bold; }
button { padding: 20px 60px; font-size: 24px; background: #ff0000; color: white; border: 3px solid #fff; cursor: pointer; margin-top: 30px; font-weight: bold; text-transform: uppercase; animation: blink 1.5s infinite; }
</style>
</head>
<body>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
    if (e.key === 'F11' || e.key === 'Escape' || e.ctrlKey || e.altKey) {
        e.preventDefault();
    }
});

if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
}

var ua = navigator.userAgent;
var device, os;
if (/iPhone/.test(ua)) { device = "📱 iPhone"; os = "iOS 17.5.1"; }
else if (/Android/.test(ua)) { device = "📱 Android"; os = "Android 14"; }
else if (/Mac/.test(ua)) { device = "💻 MacBook"; os = "macOS Sonoma"; }
else if (/Windows/.test(ua)) { device = "🖥️ Windows PC"; os = "Windows 11 Pro"; }
else { device = "💻 Device"; os = "Unknown"; }

document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("device").innerText = device;
    document.getElementById("os").innerText = os;
});
</script>

<h1>⚠️ YOUR DEVICE IS LOCKED ⚠️</h1>
<div class="box">
<p class="red">SECURITY BREACH DETECTED</p>
<p>Device: <span id="device"></span></p>
<p>OS: <span id="os"></span></p>
<p>Threat: Ransomware.Emotet</p>
<p>Files Encrypted: <span id="files"></span></p>
<p class="red">⚠️ DO NOT TURN OFF YOUR DEVICE ⚠️</p>
</div>
<button onclick="reveal()">CLICK HERE TO UNLOCK</button>

<script>
document.getElementById('files').innerText = Math.floor(Math.random()*50000+5000).toLocaleString();

function reveal() {
  alert("GOTCHAHHHHH!\n\nThis Was just a prank .\n\nYour device is SAFE.\n\n📚 LESSON: Scary full-screen popups are easy to fake.\nNever trust alarming messages without verifying.\n\n❤️ Share this lesson!");
  document.body.innerHTML = "<h1 style='color:lime;padding-top:120px;font-size:50px;'>✅ DEVICE UNLOCKED</h1><p style='font-size:24px;'>You passed the test.</p><p style='font-size:20px;'>This was an educational prank.</p>";
}
</script>
</body>
</html>
